<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-wrapper {
            background: #1e2f3f;
            padding: 30px 30px 35px;
            border-radius: 48px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 6px;
        }

        .score-box {
            background: #0b151e;
            padding: 8px 22px;
            border-radius: 60px;
            color: #b3e4ff;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.6), 0 2px 0 rgba(255, 255, 255, 0.05);
        }

        .score-box span {
            color: #f7d44a;
            font-size: 28px;
            margin-left: 6px;
        }

        .btn-reset {
            background: #2c4458;
            border: none;
            color: #d4edff;
            font-size: 18px;
            font-weight: 600;
            padding: 8px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f1a24, 0 4px 12px rgba(0, 0, 0, 0.4);
            transition: all 0.08s ease-in;
            letter-spacing: 0.5px;
        }

        .btn-reset:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0f1a24;
        }

        .btn-reset:hover {
            background: #34576e;
            color: #fff;
        }

        /* 画布容器 — 复古像素边框效果 */
        .canvas-container {
            background: #0b151e;
            padding: 12px;
            border-radius: 32px;
            box-shadow: inset 0 0 0 2px #2c4458, 0 20px 30px -8px black;
        }

        canvas {
            display: block;
            width: 500px;
            height: 500px;
            background: #1d2f3c;
            border-radius: 20px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            box-shadow: inset 0 0 0 1px #3f5a6b;
        }

        .control-hint {
            margin-top: 20px;
            color: #7b9bb0;
            font-weight: 400;
            font-size: 15px;
            letter-spacing: 0.6px;
            background: #12222e;
            padding: 10px 28px;
            border-radius: 60px;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
        }

        .control-hint kbd {
            background: #2a4154;
            color: #e3f0fa;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 600;
            margin: 0 4px;
            font-size: 16px;
        }

        /* 移动端触控按钮 */
        .touch-controls {
            display: none;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .touch-btn {
            background: #263e52;
            border: none;
            color: #ddf0ff;
            font-size: 32px;
            width: 72px;
            height: 72px;
            border-radius: 28px;
            box-shadow: 0 8px 0 #0e1a24, 0 6px 16px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.06s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .touch-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0e1a24;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 18px 18px 22px;
                border-radius: 32px;
            }

            canvas {
                width: 320px;
                height: 320px;
            }

            .score-box {
                font-size: 17px;
                padding: 6px 16px;
            }

            .btn-reset {
                font-size: 15px;
                padding: 6px 18px;
            }

            .touch-controls {
                display: flex;
            }

            .control-hint {
                font-size: 13px;
                padding: 6px 16px;
            }
        }

        @media (max-width: 420px) {
            canvas {
                width: 260px;
                height: 260px;
            }

            .touch-btn {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
        }

        @media (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <!-- 顶栏 -->
        <div class="header">
            <div class="score-box">🍎 <span id="scoreDisplay">0</span></div>
            <button class="btn-reset" id="resetBtn">⟳ 重来</button>
        </div>

        <!-- 画布 -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
        </div>

        <!-- 键盘提示 & 移动端按钮 -->
        <div class="control-hint">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        </div>

        <!-- 触控方向 (移动端) -->
        <div class="touch-controls" id="touchControls">
            <button class="touch-btn" data-dir="up">▲</button>
            <button class="touch-btn" data-dir="left">◀</button>
            <button class="touch-btn" data-dir="down">▼</button>
            <button class="touch-btn" data-dir="right">▶</button>
        </div>
    </div>

    <script>
        (function () {
            // ---------- 配置 ----------
            const BOARD_SIZE = 20; // 20x20 网格
            const CELL_SIZE = 500 / BOARD_SIZE; // 25px

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');

            // ---------- 游戏状态 ----------
            let snake = []; // 坐标数组 [x,y]
            let food = { x: 8, y: 10 };
            let direction = 'right'; // 当前移动方向
            let nextDirection = 'right';
            let score = 0;
            let gameOver = false;
            let winFlag = false; // 是否胜利（所有格子占满）
            let gameInterval = null;
            const MOVE_INTERVAL_MS = 150;

            // ---------- 初始化 / 重置 ----------
            function initGame() {
                // 蛇: 初始长度为 3，水平放置
                snake = [
                    [9, 10],
                    [8, 10],
                    [7, 10]
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                gameOver = false;
                winFlag = false;
                updateScore();

                // 生成第一个食物（避开蛇）
                generateFood();

                // 清除旧循环
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }

                // 启动循环
                gameInterval = setInterval(moveSnake, MOVE_INTERVAL_MS);

                drawCanvas();
            }

            // ---------- 生成食物 ----------
            function generateFood() {
                const totalCells = BOARD_SIZE * BOARD_SIZE;
                if (snake.length >= totalCells) {
                    // 胜利：所有格子被蛇占满
                    winFlag = true;
                    gameOver = true;
                    if (gameInterval) {
                        clearInterval(gameInterval);
                        gameInterval = null;
                    }
                    drawCanvas();
                    return;
                }

                // 收集空闲格子
                const snakeSet = new Set(snake.map(cell => `${cell[0]},${cell[1]}`));
                if (snakeSet.size === totalCells) {
                    winFlag = true;
                    gameOver = true;
                    if (gameInterval) {
                        clearInterval(gameInterval);
                        gameInterval = null;
                    }
                    drawCanvas();
                    return;
                }

                let freeCells = [];
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (!snakeSet.has(`${i},${j}`)) {
                            freeCells.push([i, j]);
                        }
                    }
                }

                if (freeCells.length === 0) {
                    winFlag = true;
                    gameOver = true;
                    if (gameInterval) {
                        clearInterval(gameInterval);
                        gameInterval = null;
                    }
                    drawCanvas();
                    return;
                }

                const randomIndex = Math.floor(Math.random() * freeCells.length);
                const [fx, fy] = freeCells[randomIndex];
                food = { x: fx, y: fy };
            }

            // ---------- 蛇移动 ----------
            function moveSnake() {
                if (gameOver) return;

                // 应用有效方向
                const opposite = {
                    'up': 'down',
                    'down': 'up',
                    'left': 'right',
                    'right': 'left'
                };
                if (nextDirection && opposite[nextDirection] !== direction) {
                    direction = nextDirection;
                }

                // 计算新头部
                const head = snake[0];
                let newHeadX = head[0];
                let newHeadY = head[1];

                switch (direction) {
                    case 'right':
                        newHeadX++;
                        break;
                    case 'left':
                        newHeadX--;
                        break;
                    case 'up':
                        newHeadY--;
                        break;
                    case 'down':
                        newHeadY++;
                        break;
                    default:
                        return;
                }

                // 检测是否吃到食物
                const isEating = (newHeadX === food.x && newHeadY === food.y);

                // 构建新蛇 (先复制)
                let newSnake = [
                    [newHeadX, newHeadY],
                    ...snake
                ];

                if (!isEating) {
                    newSnake.pop(); // 没吃到移除尾
                }

                // 碰撞检测 (边界 & 自碰)
                const headStr = `${newHeadX},${newHeadY}`;
                // 自碰: 检查除了头部自身以外是否重复 (如果新头部与后面的重复则碰撞)
                const bodyWithoutHead = newSnake.slice(1).map(cell => `${cell[0]},${cell[1]}`);
                const headCollision = bodyWithoutHead.includes(headStr);

                // 边界碰撞
                const outOfBounds = (newHeadX < 0 || newHeadX >= BOARD_SIZE || newHeadY < 0 || newHeadY >= BOARD_SIZE);

                if (outOfBounds || headCollision) {
                    gameOver = true;
                    if (gameInterval) {
                        clearInterval(gameInterval);
                        gameInterval = null;
                    }
                    drawCanvas();
                    return;
                }

                // 更新蛇
                snake = newSnake;

                // 处理吃到食物
                if (isEating) {
                    score++;
                    updateScore();
                    generateFood(); // 可能触发胜利
                    // 如果胜利, generateFood 会设置 gameOver = true 并清除 interval
                    if (gameOver) {
                        drawCanvas();
                        return;
                    }
                }

                drawCanvas();
            }

            // ---------- 绘制 ----------
            function drawCanvas() {
                ctx.clearRect(0, 0, 500, 500);

                // 绘制网格线 (淡)
                ctx.strokeStyle = '#2c4458';
                ctx.lineWidth = 0.6;
                for (let i = 0; i <= BOARD_SIZE; i++) {
                    const pos = i * CELL_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, 500);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(500, pos);
                    ctx.stroke();
                }

                // 绘制食物
                ctx.shadowColor = '#f7d44a';
                ctx.shadowBlur = 14;
                ctx.fillStyle = '#f25c3a';
                ctx.beginPath();
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                ctx.arc(fx, fy, CELL_SIZE * 0.4, 0, Math.PI * 2);
                ctx.fill();
                // 高光
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff8a6f';
                ctx.beginPath();
                ctx.arc(fx - 3, fy - 4, 5, 0, Math.PI * 2);
                ctx.fill();

                // 绘制蛇
                ctx.shadowBlur = 0;
                for (let i = 0; i < snake.length; i++) {
                    const [sx, sy] = snake[i];
                    const x = sx * CELL_SIZE;
                    const y = sy * CELL_SIZE;
                    const padding = i === 0 ? 1 : 2;
                    const radius = 5;

                    // 头部用亮色
                    if (i === 0) {
                        ctx.fillStyle = '#6ac46e';
                        ctx.shadowColor = '#8ae08e';
                        ctx.shadowBlur = 16;
                    } else {
                        const gradient = ctx.createRadialGradient(
                            x + 6, y + 6, 2,
                            x + 12, y + 12, 14
                        );
                        gradient.addColorStop(0, '#3fa543');
                        gradient.addColorStop(1, '#1f7a23');
                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = '#2f9a33';
                    }

                    // 圆角矩形
                    const cx = x + CELL_SIZE / 2;
                    const cy = y + CELL_SIZE / 2;
                    const w = CELL_SIZE - padding * 2;
                    const h = CELL_SIZE - padding * 2;
                    const rx = 5;
                    ctx.beginPath();
                    ctx.moveTo(x + padding + rx, y + padding);
                    ctx.lineTo(x + padding + w - rx, y + padding);
                    ctx.quadraticCurveTo(x + padding + w, y + padding, x + padding + w, y + padding + rx);
                    ctx.lineTo(x + padding + w, y + padding + h - rx);
                    ctx.quadraticCurveTo(x + padding + w, y + padding + h, x + padding + w - rx, y + padding + h);
                    ctx.lineTo(x + padding + rx, y + padding + h);
                    ctx.quadraticCurveTo(x + padding, y + padding + h, x + padding, y + padding + h - rx);
                    ctx.lineTo(x + padding, y + padding + rx);
                    ctx.quadraticCurveTo(x + padding, y + padding, x + padding + rx, y + padding);
                    ctx.closePath();
                    ctx.fill();

                    // 蛇头眼睛
                    if (i === 0) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'white';
                        let eyeOffsets = [];
                        if (direction === 'right') {
                            eyeOffsets = [
                                [6, -5],
                                [6, 5]
                            ];
                        } else if (direction === 'left') {
                            eyeOffsets = [
                                [-6, -5],
                                [-6, 5]
                            ];
                        } else if (direction === 'up') {
                            eyeOffsets = [
                                [-5, -6],
                                [5, -6]
                            ];
                        } else if (direction === 'down') {
                            eyeOffsets = [
                                [-5, 6],
                                [5, 6]
                            ];
                        }
                        for (const [dx, dy] of eyeOffsets) {
                            ctx.beginPath();
                            ctx.arc(cx + dx, cy + dy, 3.5, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                        ctx.fillStyle = '#1d2f3c';
                        for (const [dx, dy] of eyeOffsets) {
                            ctx.beginPath();
                            ctx.arc(cx + dx + (direction === 'right' ? 2 : direction === 'left' ? -2 : 0),
                                cy + dy + (direction === 'down' ? 2 : direction === 'up' ? -2 : 0),
                                1.8, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    }
                }

                // 阴影重置
                ctx.shadowBlur = 0;

                // 游戏结束/胜利 蒙层
                if (gameOver) {
                    ctx.fillStyle = 'rgba(10, 20, 28, 0.75)';
                    ctx.fillRect(0, 0, 500, 500);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = 'bold 38px "Segoe UI", system-ui, sans-serif';
                    ctx.shadowColor = 'black';
                    ctx.shadowBlur = 24;
                    if (winFlag) {
                        ctx.fillStyle = '#f7d44a';
                        ctx.fillText('🎉 你赢了！', 250, 210);
                        ctx.font = '24px sans-serif';
                        ctx.fillStyle = '#d4edff';
                        ctx.fillText('完美通关', 250, 280);
                    } else {
                        ctx.fillStyle = '#ff716a';
                        ctx.fillText('💀 游戏结束', 250, 220);
                        ctx.font = '22px sans-serif';
                        ctx.fillStyle = '#d4edff';
                        ctx.fillText('点击 "重来" 继续', 250, 290);
                    }
                    ctx.shadowBlur = 0;
                }
            }

            // ---------- 分数更新 ----------
            function updateScore() {
                scoreSpan.textContent = score;
            }

            // ---------- 方向控制 ----------
            function setDirection(newDir) {
                if (gameOver) return;
                const opposite = {
                    'up': 'down',
                    'down': 'up',
                    'left': 'right',
                    'right': 'left'
                };
                // 不允许原地掉头
                if (opposite[newDir] !== direction) {
                    nextDirection = newDir;
                }
            }

            // ---------- 键盘事件 ----------
            function onKeydown(e) {
                const key = e.key;
                // 防止页面滚动
                const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                if (arrowKeys.includes(key)) {
                    e.preventDefault();
                }

                switch (key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        setDirection('up');
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        setDirection('down');
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        setDirection('left');
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        setDirection('right');
                        break;
                    default:
                        return;
                }
            }

            // ---------- 重置 ----------
            function resetGame() {
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                initGame();
            }

            // ---------- 触控绑定 ----------
            function setupTouchButtons() {
                const btns = document.querySelectorAll('.touch-btn');
                btns.forEach(btn => {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        const dir = btn.getAttribute('data-dir');
                        if (dir) setDirection(dir);
                    });
                    btn.addEventListener('mousedown', (e) => {
                        const dir = btn.getAttribute('data-dir');
                        if (dir) setDirection(dir);
                    });
                });
            }

            // ---------- 启动 ----------
            window.addEventListener('load', () => {
                initGame();
                window.addEventListener('keydown', onKeydown);
                document.getElementById('resetBtn').addEventListener('click', resetGame);
                setupTouchButtons();

                // 阻止移动端页面滑动
                canvas.addEventListener('touchstart', (e) => e.preventDefault());
            });

            // 清理定时器 (页面卸载)
            window.addEventListener('beforeunload', () => {
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
            });

        })();
    </script>
</body>

</html>
