<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">
      {{ site.title | escape }}
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger" class="menu-icon">
        <span class="menu-icon-bar"></span>
        <span class="menu-icon-bar"></span>
        <span class="menu-icon-bar"></span>
      </label>
      <div class="trigger">
        <a class="page-link" href="{{ '/' | relative_url }}">首页</a>
        <a class="page-link" href="{{ '/about' | relative_url }}">关于</a>
        {% if site.github_username %}
        <a class="page-link" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        {% endif %}
      </div>
    </nav>
  </div>
</header>
