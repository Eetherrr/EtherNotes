# Site settings
title: EtherNotes
description: 个人知识笔记 — FPGA、嵌入式、以及各种杂七杂八的东西
theme: minima

# Language & timezone
lang: zh-CN
timezone: Asia/Shanghai

# Author info
author:
  name: Ether
  avatar: /assets/images/avatar.png
  bio: 我是Eetherrr，这里记录我的学习笔记和想法。

# Social
github_username: Eetherrr
qq_number: "941288046"  # 填入你的 QQ 号

# Build settings
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-diagrams

# Minima settings
minima:
  skin: auto
  social_links:
    - platform: github
      user_url: "https://github.com/Eetherrr"

# Display name mapping for directories (any depth under _posts/)
# New directories are auto-discovered; add display names here
dir_names:
  hardware: "硬件区"
  software: "软件区"
  protocol: "接口协议"
  manual: "手册"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
